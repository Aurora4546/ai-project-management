spring.application.name=pmanage

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/ai_project_management
spring.datasource.username=postgres
spring.datasource.password=7501
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8080

# Spring AI Google GenAI Configuration
spring.ai.google.genai.api-key=${GOOGLE_API_KEY:dummy-api-key}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.3

# Chat File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload-dir=./uploads/chat

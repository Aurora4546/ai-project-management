<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create an Account | Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d283a",
                        "background-light": "#f6f7f7",
                        "background-dark": "#16181c",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="min-h-screen flex items-center justify-center p-4">
<!-- Main Registration Card -->
<div class="w-full max-w-[480px] bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg p-8">
<div class="mb-8">
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">Create an Account</h1>
</div>
<form action="#" class="space-y-5" method="POST">
<!-- Name Row -->
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-900 dark:text-slate-100" for="first_name">First Name</label>
<input class="w-full px-3 py-2 border border-slate-200 dark:border-slate-800 rounded-lg bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-0 focus:border-primary" id="first_name" name="first_name" placeholder="First name" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-900 dark:text-slate-100" for="last_name">Last Name</label>
<input class="w-full px-3 py-2 border border-slate-200 dark:border-slate-800 rounded-lg bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-0 focus:border-primary" id="last_name" name="last_name" placeholder="Last name" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-900 dark:text-slate-100" for="email">Email</label>
<input class="w-full px-3 py-2 border border-slate-200 dark:border-slate-800 rounded-lg bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-0 focus:border-primary" id="email" name="email" placeholder="your@email.com" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-900 dark:text-slate-100" for="password">Password</label>
<input class="w-full px-3 py-2 border border-slate-200 dark:border-slate-800 rounded-lg bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-0 focus:border-primary" id="password" name="password" placeholder="Create a password" type="password"/>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-900 dark:text-slate-100" for="confirm_password">Confirm Password</label>
<input class="w-full px-3 py-2 border border-slate-200 dark:border-slate-800 rounded-lg bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-0 focus:border-primary" id="confirm_password" name="confirm_password" placeholder="Confirm your password" type="password"/>
</div>
<!-- Action Button -->
<div class="pt-2">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3 px-4 rounded-lg transition-colors duration-200" type="submit">
                        Register
                    </button>
</div>
</form>
<!-- Optional Footer Link -->
<div class="mt-6 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    Already have an account? 
                    <a class="text-primary font-medium hover:underline" href="#">Log in</a>
</p>
</div>
</div>
</div>
</body></html>
